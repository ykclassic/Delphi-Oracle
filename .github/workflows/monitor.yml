name: Delphi Oracle - Trade Monitor

on:
  schedule:
    - cron: '*/15 * * * 1-5' # Runs every 15 minutes, Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-trades:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # We call a small wrapper script 'run_monitor.py' 
          # which uses SignalMonitor and sends results to Discord
          python run_monitor.py

      - name: Sync Logs
        run: |
          git config --global user.name "Delphi-Monitor-Bot"
          git config --global user.email "bot@delphi-oracle.local"
          git add logs/trade_log.csv
          git commit -m "📈 Sync: Trade Outcomes [skip ci]" || echo "No changes"
          git push
